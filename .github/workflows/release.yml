name: Release

# Запускается при пуше тега вида v1.0.0
# Или вручную через GitHub → Actions → Release → Run workflow
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Создать как черновик (draft)?'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (Apple Silicon — M1/M2/M3/M4)
          # Rosetta 2 позволяет запускать на Intel без перекомпиляции
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS

          # Windows x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

          # Linux x64 (.AppImage + .deb)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsecret-1-dev \
            pkg-config

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Meridian Mail ${{ github.ref_name }}'
          releaseBody: |
            ## Что нового
            <!-- Опишите изменения -->

            ## Установка
            | Платформа | Файл |
            |-----------|------|
            | macOS | `.dmg` |
            | Windows | `.msi` или `.exe` |
            | Linux | `.AppImage` или `.deb` |

            > **macOS:** при первом запуске может появиться предупреждение о неизвестном разработчике.
            > Откройте через правую кнопку мыши → «Открыть».
          releaseDraft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: false
          args: --target ${{ matrix.target }}
